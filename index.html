<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministerio de Limpieza</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
background:linear-gradient(135deg,#eaf2ff,#f8fbff);
color:#1a2a44;
}

/* CONTENEDOR */
.container{
max-width:1000px;
margin:25px auto;
padding:30px;
border-radius:22px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
margin:0;
font-weight:700;
letter-spacing:-0.5px;
color:#1f6fb2;
}

.header h2{
margin-top:5px;
font-size:15px;
opacity:0.6;
}

/* USUARIO */
#titulo{
margin-top:15px;
font-size:14px;
font-weight:500;
color:#1f6fb2;
opacity:0.8;
text-align:center;
}

/* VERSICULO */
.versiculo{
background:#eef5ff;
padding:14px;
border-radius:14px;
margin-top:15px;
font-style:italic;
font-size:13px;
display:none;
}

.referencia{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

/* TABLA */
table{
width:100%;
margin-top:25px;
border-collapse:separate;
border-spacing:0 22px;
}

th{
font-size:13px;
opacity:0.6;
font-weight:600;
padding-bottom:10px;
}

/* TARJETAS */
tr{
background:white;
box-shadow:0 12px 25px rgba(0,0,0,0.06);
border-radius:16px;
overflow:hidden;
}

/* CELDAS */
td{
padding:16px;
vertical-align:top;
}

/* DÍA COMPACTO */
td:first-child{
width:65px;
min-width:65px;
text-align:center;
padding:10px 6px;
}

/* BADGE DÍA */
.dia-badge{
display:inline-block;
padding:6px 10px;
border-radius:10px;
background:#eef5ff;
color:#1f6fb2;
font-size:11px;
font-weight:600;
}

/* INPUTS */
textarea{
width:100%;
background:#f5f9ff;
border:1px solid rgba(0,0,0,0.05);
border-radius:12px;
padding:12px;
color:#1a2a44;
resize:none;
height:90px;
font-size:13px;
transition:0.2s;
}

textarea:focus{
outline:none;
border:1px solid #4da3ff;
background:white;
box-shadow:0 0 0 2px rgba(77,163,255,0.2);
}

/* PETICIÓN */
.peticion{
margin-top:30px;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

/* BOTONES */
.botones{
display:flex;
gap:15px;
margin-top:25px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
color:white;
}

.guardar{
background:linear-gradient(135deg,#4da3ff,#1f6fb2);
}

.enviar{
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* LOGIN */
.login{
text-align:center;
padding:30px 10px;
}

.login input{
padding:12px;
border:1px solid rgba(0,0,0,0.1);
border-radius:12px;
background:white;
text-align:center;
width:80%;
max-width:250px;
}

.login button{
margin-top:10px;
padding:12px 25px;
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
color:white;
}

/* ANIMACIÓN */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE */
@media(max-width:700px){

table{
border-spacing:0 26px;
}

textarea{
height:100px;
font-size:12px;
}

td{
display:block;
width:100%;
padding:10px 0;
}

tr{
padding:15px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Ministerio de Limpieza</h1>
<h2>Registro Devocional Semanal</h2>

<div id="versiculo" class="versiculo">
“Porque Dios no es injusto para olvidar vuestra obra…”
<div class="referencia">Hebreos 6:10 RV 1960</div>
</div>
</div>

<div id="login" class="login">
<h3>Ingresar Usuario</h3>
<input id="usuario" placeholder="Escribe tu usuario">
<br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 id="titulo"></h3>

<table>
<tr>
<th>Día</th>
<th>Lectura</th>
<th>Oración (min)</th>
<th>Lo que Dios me habló</th>
</tr>
<tbody id="tabla"></tbody>
</table>

<div class="peticion">
<strong>Petición de oración</strong>
<br><br>
<textarea id="peticion"></textarea>
</div>

<div class="botones">
<button class="guardar" onclick="guardar()">Guardar</button>
<button class="enviar" onclick="enviar()">Enviar</button>
</div>

</div>

</div>

<script>

const dias=["Lun","Mar","Mié","Jue","Vie","Sáb"];
let usuario="";

window.onload=function(){

let usuarioGuardado=localStorage.getItem("usuario");

if(usuarioGuardado){
usuario=usuarioGuardado;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("titulo").innerText="Usuario: "+usuario;
document.getElementById("versiculo").style.display="block";
crearTabla();
setTimeout(cargarDatos,200);
controlarEnvio();
}

}

function entrar(){

usuario=document.getElementById("usuario").value;

if(usuario==""){
alert("Escribe un usuario");
return;
}

localStorage.setItem("usuario",usuario);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("titulo").innerText="Usuario: "+usuario;
document.getElementById("versiculo").style.display="block";

crearTabla();
controlarEnvio();

}

function crearTabla(){

let html="";

dias.forEach(d=>{

html+=`
<tr>
<td><span class="dia-badge">${d}</span></td>
<td><textarea id="${d}-lectura"></textarea></td>
<td><textarea id="${d}-oracion"></textarea></td>
<td><textarea id="${d}-dios"></textarea></td>
</tr>
`;

});

document.getElementById("tabla").innerHTML=html;

}

function guardar(){

let data={};

dias.forEach(d=>{

data[d]={
lectura:document.getElementById(d+"-lectura").value,
oracion:document.getElementById(d+"-oracion").value,
dios:document.getElementById(d+"-dios").value
}

});

data["peticion"]=document.getElementById("peticion").value;

localStorage.setItem("datos",JSON.stringify(data));

alert("Progreso guardado");

}

function cargarDatos(){

let datos=JSON.parse(localStorage.getItem("datos"));
if(!datos) return;

dias.forEach(d=>{
if(datos[d]){
document.getElementById(d+"-lectura").value=datos[d].lectura || "";
document.getElementById(d+"-oracion").value=datos[d].oracion || "";
document.getElementById(d+"-dios").value=datos[d].dios || "";
}
});

document.getElementById("peticion").value=datos["peticion"] || "";

}

/* CONTROL ENVÍO */

function controlarEnvio(){

let tiempoGuardado=localStorage.getItem("tiempoEnvio");

if(tiempoGuardado){

let ahora=Date.now();
let diferencia=ahora-parseInt(tiempoGuardado);

if(diferencia<60000){

bloquearBoton();

let restante=60000-diferencia;

setTimeout(()=>{desbloquearBoton();},restante);

}

}

}

function bloquearBoton(){

let btn=document.querySelector(".enviar");

btn.disabled=true;
btn.innerText="Ya se ha enviado el devocional";
btn.style.background="gray";

}

function desbloquearBoton(){

let btn=document.querySelector(".enviar");

btn.disabled=false;
btn.innerText="Enviar";
btn.style.background="linear-gradient(135deg,#1f6fb2,#0b3d91)";

localStorage.removeItem("tiempoEnvio");

}

/* ENVIAR */

function enviar(){

let btn=document.querySelector(".enviar");

btn.disabled=true;
btn.innerText="Enviando...";
btn.style.background="gray";

let datos=[];
let incompleto=false;
let errorOracion=false;

let peticion=document.getElementById("peticion").value;

dias.forEach(d=>{

let lectura=document.getElementById(d+"-lectura").value.trim();
let oracion=document.getElementById(d+"-oracion").value.trim();
let dios=document.getElementById(d+"-dios").value.trim();

if(!lectura || !oracion || !dios) incompleto=true;

if(!/^\d+$/.test(oracion)) errorOracion=true;

datos.push({usuario,dia:d,lectura,oracion,dios,peticion});

});

if(incompleto){
alert("Llena todos los campos");
desbloquearBoton();
return;
}

if(errorOracion){
alert("No puedes escribir letras en oración");
desbloquearBoton();
return;
}

fetch("https://script.google.com/macros/s/AKfycbyPHJZ1WwdLSfnYCKoJmv2-r3iLS7Za7DBw-9BE-x5yFtuY_io_426fdFOPCd6cY1xnTw/exec",{
method:"POST",
body:JSON.stringify(datos)
})
.then(r=>r.text())
.then(()=>{
alert("Enviado correctamente");
localStorage.setItem("tiempoEnvio",Date.now());
bloquearBoton();
localStorage.removeItem("datos");
})
.catch(()=>{
alert("Error al enviar");
desbloquearBoton();
});

}

</script>

</body>
</html>
